server {
    listen 443 ssl;
    server_name cp25ms1.sit.kmutt.ac.th bscit.sit.kmutt.ac.th;

    client_max_body_size 2G;

    ssl_certificate /etc/nginx/certificates/fullchain.pem;
    ssl_certificate_key /etc/nginx/certificates/privkey.pem;
    ssl_dhparam /etc/nginx/certificates/dhparam-2048.pem;

    ssl_protocols TLSv1.3;
    ssl_ciphers 'EECDH+AESGCM:EDH+AESGCM';
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;

    resolver 127.0.0.11 valid=30s;

    set $media "minio-prod";

    location /capstone25/cp25ms1/media/ {

        proxy_pass http://$media:9000/;

        proxy_http_version 1.1;

        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_request_buffering off;

        chunked_transfer_encoding off;
    }

    location /capstone25/cp25ms1/media-console/ {

        proxy_pass http://$media:9001/;

        proxy_http_version 1.1;

        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /capstone25/cp25ms1/api/ {

        rewrite ^/capstone25/cp25ms1/api/(.*)$ /$1 break;

        proxy_pass http://backend-prod:8000;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location / {

        rewrite ^/(.*)$ /capstone25/cp25ms1/$1 break;

        proxy_pass http://frontend-prod:3000;

        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name cp25ms1.sit.kmutt.ac.th;

    return 301 https://$host$request_uri;
}