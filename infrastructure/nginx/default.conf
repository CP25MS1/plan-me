map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 443 ssl;
    server_name cp25ms1.sit.kmutt.ac.th bscit.sit.kmutt.ac.th;

    client_max_body_size 2G;

    ssl_certificate /etc/nginx/certificates/fullchain.pem;
    ssl_certificate_key /etc/nginx/certificates/privkey.pem;
    ssl_dhparam /etc/nginx/certificates/dhparam-2048.pem;

    ssl_protocols TLSv1.3;
    ssl_ciphers 'EECDH+AESGCM:EDH+AESGCM';
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;

    resolver 127.0.0.11 valid=30s;
    set $media "minio-prod";

    location / {
        rewrite ^/(.*)$ /capstone25/cp25ms1/$1 break;
        proxy_pass http://frontend-prod:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^(/capstone25/cp25ms1)?/api/(?!(realtime)) {
        rewrite ^(/capstone25/cp25ms1)?/api/(.*)$ /$2 break;
        proxy_pass http://backend-prod:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Trip realtime (SSE + locks + presence)
    location ~ ^(/capstone25/cp25ms1)?/api/realtime/ {
        rewrite ^(/capstone25/cp25ms1)?/api/(.*)$ /$2 break;
        proxy_pass http://backend-prod:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        gzip off;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /media/ {
        proxy_pass http://minio-prod:9000/;
    }

    location /media-console/ {
        proxy_pass http://minio-prod:9001/;
    }
}

server {
    listen 80;
    server_name cp25ms1.sit.kmutt.ac.th;

    return 301 https://$host$request_uri;
}
